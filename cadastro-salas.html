<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Salas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">CineWeb</a>
            <div class="navbar-nav">
                <a class="nav-link" href="cadastro-filmes.html">Filmes</a>
                <a class="nav-link active" href="cadastro-salas.html">Salas</a>
                <a class="nav-link" href="cadastro-sessoes.html">Cadastrar Sessões</a>
                <a class="nav-link" href="sessoes.html">Sessões Disponíveis</a>
                <a class="nav-link" href="venda-ingressos.html">Vender Ingresso</a>
                <a class="nav-link" href="gerenciamento.html">Gerenciamento</a>

            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Cadastro de Salas</h2>
        <form id="form-sala">
            <div class="mb-3">
                <label for="nomeSala" class="form-label">Nome da Sala</label>
                <input type="text" class="form-control" id="nomeSala" required>
            </div>
            <div class="mb-3">
                <label for="capacidade" class="form-label">Capacidade (Lugares)</label>
                <input type="number" class="form-control" id="capacidade" required>
            </div>
            <div class="mb-3">
                <label for="tipoSala" class="form-label">Tipo de Sala</label>
                <select class="form-select" id="tipoSala" required>
                    <option value="">Selecione...</option>
                    <option value="2D">2D</option>
                    <option value="3D">3D</option>
                    <option value="IMAX">IMAX</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Salvar Sala</button>
        </form>
    </div>

    <script src="js/salas.js"></script>
</body>
</html>
