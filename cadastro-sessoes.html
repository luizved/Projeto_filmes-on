<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Sessões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">CineWeb</a>
            <div class="navbar-nav">
                <a class="nav-link" href="cadastro-filmes.html">Filmes</a>
                <a class="nav-link" href="cadastro-salas.html">Salas</a>
                <a class="nav-link active" href="cadastro-sessoes.html">Cadastrar Sessões</a>
                <a class="nav-link" href="sessoes.html">Sessões Disponíveis</a>
                <a class="nav-link" href="venda-ingressos.html">Vender Ingresso</a>
                <a class="nav-link" href="gerenciamento.html">Gerenciamento</a>

            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Cadastro de Sessões</h2>
        <form id="form-sessao">
            <div class="mb-3">
                <label for="sessaoFilme" class="form-label">Filme</label>
                <select class="form-select" id="sessaoFilme" required>
                    <option value="">Selecione um filme...</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="sessaoSala" class="form-label">Sala</label>
                <select class="form-select" id="sessaoSala" required>
                    <option value="">Selecione uma sala...</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="dataHora" class="form-label">Data e Hora</label>
                <input type="datetime-local" class="form-control" id="dataHora" required>
            </div>
            <div class="mb-3">
                <label for="preco" class="form-label">Preço (R$)</label>
                <input type="number" step="0.01" class="form-control" id="preco" required>
            </div>
            <div class="mb-3">
                <label for="idioma" class="form-label">Idioma</label>
                <select class="form-select" id="idioma" required>
                    <option value="">Selecione...</option>
                    <option value="Dublado">Dublado</option>
                    <option value="Legendado">Legendado</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="formato" class="form-label">Formato</label>
                <select class="form-select" id="formato" required>
                    <option value="">Selecione...</option>
                    <option value="2D">2D</option>
                    <option value="3D">3D</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Salvar Sessão</button>
        </form>
    </div>

    <script src="js/sessoes-cadastro.js"></script>
</body>
</html>
