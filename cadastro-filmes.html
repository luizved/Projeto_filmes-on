<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Filmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">CineWeb</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="cadastro-filmes.html">Filmes</a>
                <a class="nav-link" href="cadastro-salas.html">Salas</a>
                <a class="nav-link" href="cadastro-sessoes.html">Cadastrar Sessões</a>
                <a class="nav-link" href="sessoes.html">Sessões Disponíveis</a>
                <a class="nav-link" href="venda-ingressos.html">Vender Ingresso</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Cadastro de Filmes</h2>
        <form id="form-filme">
            <div class="mb-3">
                <label for="titulo" class="form-label">Título</label>
                <input type="text" class="form-control" id="titulo" required>
            </div>
            <div class="mb-3">
                <label for="genero" class="form-label">Gênero</label>
                <select class="form-select" id="genero" required>
                    <option value="">Selecione...</option>
                    <option value="Ação">Ação</option>
                    <option value="Comédia">Comédia</option>
                    <option value="Drama">Drama</option>
                    <option value="Terror">Terror</option>
                    <option value="Ficção">Ficção Científica</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <textarea class="form-control" id="descricao" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label for="classificacao" class="form-label">Classificação Indicativa</label>
                <select class="form-select" id="classificacao" required>
                    <option value="">Selecione...</option>
                    <option value="Livre">Livre</option>
                    <option value="10">10 anos</option>
                    <option value="12">12 anos</option>
                    <option value="14">14 anos</option>
                    <option value="16">16 anos</option>
                    <option value="18">18 anos</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="duracao" class="form-label">Duração (minutos)</label>
                <input type="number" class="form-control" id="duracao" required>
            </div>
            <div class="mb-3">
                <label for="estreia" class="form-label">Data de Estreia</label>
                <input type="date" class="form-control" id="estreia" required>
            </div>
            <button type="submit" class="btn btn-primary">Salvar Filme</button>
        </form>
    </div>

    <script src="js/filmes.js"></script>
</body>
</html>
