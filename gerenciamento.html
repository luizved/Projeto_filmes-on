<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento do Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-film me-2"></i>CineWeb</a>
            <div class="collapse navbar-collapse">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="cadastro-filmes.html">Filmes</a>
                    <a class="nav-link" href="cadastro-salas.html">Salas</a>
                    <a class="nav-link" href="cadastro-sessoes.html">Cadastrar Sessões</a>
                    <a class="nav-link" href="sessoes.html">Sessões Disponíveis</a>
                    <a class="nav-link" href="venda-ingressos.html">Vender Ingresso</a>
                    <a class="nav-link active fw-bold text-warning" href="gerenciamento.html">Gerenciar Dados</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container bg-white p-4 rounded shadow-sm">
        <h2 class="mb-4"><i class="bi bi-gear-fill me-2"></i>Painel de Gerenciamento</h2>

        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-filmes" type="button">Filmes</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-salas" type="button">Salas</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-sessoes" type="button">Sessões</button>
            </li>
        </ul>

        <div class="tab-content mt-3" id="myTabContent">
            
            <div class="tab-pane fade show active" id="tab-filmes">
                <table class="table table-striped table-hover mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Título</th>
                            <th>Gênero</th>
                            <th>Classificação</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-filmes">
                        </tbody>
                </table>
            </div>

            <div class="tab-pane fade" id="tab-salas">
                <table class="table table-striped table-hover mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Nome da Sala</th>
                            <th>Capacidade</th>
                            <th>Tipo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-salas">
                        </tbody>
                </table>
            </div>

            <div class="tab-pane fade" id="tab-sessoes">
                <table class="table table-striped table-hover mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Filme</th>
                            <th>Sala</th>
                            <th>Data e Hora</th>
                            <th>Preço</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-sessoes">
                        </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Quando a página carregar, puxa todos os dados
        document.addEventListener('DOMContentLoaded', function() {
            carregarTabelas();
        });

        function carregarTabelas() {
            carregarFilmes();
            carregarSalas();
            carregarSessoes();
        }

        // ==================== LÓGICA DE FILMES ====================
        function carregarFilmes() {
            const tbody = document.getElementById('tabela-filmes');
            if (!tbody) return;
            
            const filmes = JSON.parse(localStorage.getItem('filmes')) || [];
            tbody.innerHTML = ''; // Limpa a tabela antes de recarregar

            filmes.forEach((filme, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${filme.titulo}</td>
                        <td>${filme.genero}</td>
                        <td>${filme.classificacao}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editarFilme(${index})" title="Editar"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-danger" onclick="deletarItem('filmes', ${index})" title="Excluir"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function editarFilme(index) {
            const filmes = JSON.parse(localStorage.getItem('filmes'));
            const filme = filmes[index];
            
            // Pergunta os novos valores
            const novoTitulo = prompt("Editar Título do Filme:", filme.titulo);
            if (novoTitulo === null || novoTitulo.trim() === "") return; // Cancela se deixar em branco
            
            const novoGenero = prompt("Editar Gênero:", filme.genero);
            if (novoGenero === null || novoGenero.trim() === "") return;
            
            // Atualiza e salva
            filmes[index].titulo = novoTitulo;
            filmes[index].genero = novoGenero;
            localStorage.setItem('filmes', JSON.stringify(filmes));
            
            carregarFilmes();
            alert('Filme atualizado com sucesso!');
        }

        // ==================== LÓGICA DE SALAS ====================
        function carregarSalas() {
            const tbody = document.getElementById('tabela-salas');
            if (!tbody) return;
            
            const salas = JSON.parse(localStorage.getItem('salas')) || [];
            tbody.innerHTML = '';

            salas.forEach((sala, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${sala.nomeSala}</td>
                        <td>${sala.capacidade} lugares</td>
                        <td>${sala.tipoSala}</td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deletarItem('salas', ${index})" title="Excluir"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        // ==================== LÓGICA DE SESSÕES ====================
        function carregarSessoes() {
            const tbody = document.getElementById('tabela-sessoes');
            if (!tbody) return;
            
            const sessoes = JSON.parse(localStorage.getItem('sessoes')) || [];
            tbody.innerHTML = '';

            sessoes.forEach((sessao, index) => {
                // Formata a data para ficar bonita na tabela
                const dataFormatada = new Date(sessao.dataHora).toLocaleString('pt-BR');
                tbody.innerHTML += `
                    <tr>
                        <td>${sessao.filme}</td>
                        <td>${sessao.sala}</td>
                        <td>${dataFormatada}</td>
                        <td>R$ ${sessao.preco}</td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deletarItem('sessoes', ${index})" title="Excluir"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        // ==================== FUNÇÃO UNIVERSAL DE DELETAR ====================
        // Serve para apagar itens de qualquer uma das 3 listas
        function deletarItem(chaveStorage, index) {
            const confirmacao = confirm("Tem certeza que deseja excluir este item permanentemente?");
            
            if (confirmacao) {
                let itens = JSON.parse(localStorage.getItem(chaveStorage));
                itens.splice(index, 1); // Remove 1 item da posição informada
                localStorage.setItem(chaveStorage, JSON.stringify(itens));
                
                carregarTabelas(); // Atualiza a tela
            }
        }
    </script>
</body>
</html>
