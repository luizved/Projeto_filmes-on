<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Venda de Ingressos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">CineWeb</a>
            <div class="navbar-nav">
                <a class="nav-link" href="cadastro-filmes.html">Filmes</a>
                <a class="nav-link" href="cadastro-salas.html">Salas</a>
                <a class="nav-link" href="cadastro-sessoes.html">Cadastrar Sessões</a>
                <a class="nav-link" href="sessoes.html">Sessões Disponíveis</a>
                <a class="nav-link active" href="venda-ingressos.html">Vender Ingresso</a>
                <a class="nav-link" href="gerenciamento.html">Gerenciamento</a>

            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Venda de Ingressos</h2>
        <form id="form-venda">
            <div class="mb-3">
                <label for="vendaSessao" class="form-label">Sessão</label>
                <select class="form-select" id="vendaSessao" required>
                    <option value="">Selecione a sessão...</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="clienteNome" class="form-label">Nome do Cliente</label>
                <input type="text" class="form-control" id="clienteNome" required>
            </div>
            <div class="mb-3">
                <label for="clienteCpf" class="form-label">CPF</label>
                <input type="text" class="form-control" id="clienteCpf" required>
            </div>
            <div class="mb-3">
                <label for="assento" class="form-label">Assento (Ex: A10)</label>
                <input type="text" class="form-control" id="assento" required>
            </div>
            <div class="mb-3">
                <label for="pagamento" class="form-label">Tipo de Pagamento</label>
                <select class="form-select" id="pagamento" required>
                    <option value="">Selecione...</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success">Confirmar Venda</button>
        </form>
    </div>

    <script src="js/ingressos.js"></script>
</body>
</html>
